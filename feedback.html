         <section class="container-lg mt-5">
  <h2>Feedback Form</h2>
  <p class="text-secondary">Help us Improve by giving Your Feedback</p>
  <div class="row">
    <div class="col-md-6">
      <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label">Email address</label>
    <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
    <div id="emailHelp" class="form-text text-secondary">We'll never share your email with anyone else.</div>
  </div>
    </div>
    <div class="col-md-6">
      <div class="mb-3">
    <label for="exampleInput" class="form-label">Username</label>
    <input type="text" class="form-control" id="exampleInput" aria-describedby="Help">
    <div id="Help" class="form-text text-secondary">Your Username should be unique.</div>
  </div> 
</div>
    </div>
  </div>
  <label for="input" class="form-label">Feedback Category</label>
<input type="text" id="input" class="form-control" aria-describedby="HelpBlock">
<div id="HelpBlock" class="form-text">
  
</div>
<div class="mb-4 mt-3">
  <label for="exampleFormControlTextarea1" class="form-label">Overall Rating🧿⭐⭐⭐⭐⭐</label>
  <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
</div>
<label for="range1" class="form-label">Satisfication Level</label>
<input type="range" class="form-range" id="range1">
<p class="text-secondary">From poor to excellent </p>
